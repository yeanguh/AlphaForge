<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1450" viewBox="0 0 1200 1450">
<style>
text{font-family:'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',Arial,sans-serif}
.title{font-size:34px;font-weight:800;fill:#111827}.h{font-size:24px;font-weight:800;fill:#0f172a}
.n{font-size:19px;font-weight:700;fill:#111827}.s{font-size:15px;fill:#374151}
.box{rx:18;stroke-width:2}.main{fill:#eff6ff;stroke:#2563eb}.risk{fill:#fff1f2;stroke:#e11d48;stroke-dasharray:10 8}
.arrow{stroke:#2563eb;stroke-width:4;marker-end:url(#arrow)}
</style>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker></defs>
<rect width="1200" height="1450" fill="#ffffff"/>
<text x="60" y="70" class="title">物理AI/人形机器人产业链：卡口节点与核心三公司</text>
<text x="60" y="112" class="s">研究主线：人形机器人量产爬坡 -> 执行器/传动/控制价值重估 -> 用订单、收入占比、K线结构筛出可执行机会</text>

<rect x="60" y="150" width="250" height="110" class="box main"/><text x="82" y="188" class="n">需求触发</text><text x="82" y="220" class="s">企业AI进入工作流</text><text x="82" y="246" class="s">具身智能从演示到量产</text>
<rect x="335" y="150" width="250" height="110" class="box main"/><text x="357" y="188" class="n">价格信号</text><text x="357" y="220" class="s">高估值样本波动放大</text><text x="357" y="246" class="s">市场惩罚远期叙事</text>
<rect x="610" y="150" width="250" height="110" class="box main"/><text x="632" y="188" class="n">研究焦点</text><text x="632" y="220" class="s">不买主题，找卡口</text><text x="632" y="246" class="s">订单/客户/良率验证</text>
<rect x="885" y="150" width="250" height="110" class="box main"/><text x="907" y="188" class="n">执行顺序</text><text x="907" y="220" class="s">卡口价值 -> 财务兑现</text><text x="907" y="246" class="s">-> 技术买卖点</text>

<text x="470" y="325" class="h">核心节点三公司校验</text>
<rect x="95" y="360" width="1010" height="138" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="125" y="398" class="n">1. 减速器/精密传动</text><text x="125" y="430" class="s">核心三公司：绿的谐波 / 双环传动 / 中大力德</text><text x="125" y="458" class="s">投资逻辑：决定关节运动精度、寿命和负载，是人形机器人从样机走向量产最需要验证的卡口。</text><text x="125" y="484" class="s">反证风险：订单和客户认证不足、谐波/行星/滚柱丝杠路线切换、扩产后价格压力。</text><line x1="600" y1="505" x2="600" y2="528" class="arrow"/><rect x="95" y="535" width="1010" height="138" rx="18" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/><text x="125" y="573" class="n">2. 丝杠/线性执行器</text><text x="125" y="605" class="s">核心三公司：秦川机床 / 贝斯特 / 五洲新春</text><text x="125" y="633" class="s">投资逻辑：线性执行器对应腿部、手臂等运动单元，丝杠良率、寿命和一致性决定量产天花板。</text><text x="125" y="659" class="s">反证风险：送样不等于量产，机器人收入占比披露不足会削弱估值支撑。</text><line x1="600" y1="680" x2="600" y2="703" class="arrow"/><rect x="95" y="710" width="1010" height="138" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/><text x="125" y="748" class="n">3. 伺服/运动控制</text><text x="125" y="780" class="s">核心三公司：鸣志电器 / 汇川技术 / 雷赛智能</text><text x="125" y="808" class="s">投资逻辑：控制响应、伺服精度和关节协同决定机器人运动能力，应用广但竞争也更分散。</text><text x="125" y="834" class="s">反证风险：壁垒低于核心传动，价格竞争和主业周期会稀释机器人弹性。</text><line x1="600" y1="855" x2="600" y2="878" class="arrow"/><rect x="95" y="885" width="1010" height="138" rx="18" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="125" y="923" class="n">4. 本体/系统集成</text><text x="125" y="955" class="s">核心三公司：埃斯顿 / 汇川技术 / 机器人</text><text x="125" y="983" class="s">投资逻辑：承接终端场景和工程交付，能验证下游需求，但利润池可能被集成成本吞噬。</text><text x="125" y="1009" class="s">反证风险：本体环节竞争者多，若缺少核心零部件自供和规模化订单，估值弹性有限。</text><line x1="600" y1="1030" x2="600" y2="1053" class="arrow"/><rect x="95" y="1060" width="1010" height="138" rx="18" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/><text x="125" y="1098" class="n">5. 精密加工/检测设备</text><text x="125" y="1130" class="s">核心三公司：华中数控 / 华辰装备 / 日发精机</text><text x="125" y="1158" class="s">投资逻辑：影响丝杠、减速器等核心部件良率和扩产速度，是上游卡口的设备底座。</text><text x="125" y="1184" class="s">反证风险：需要确认机器人链订单而不是传统机床周期反弹。</text>

<rect x="120" y="1250" width="960" height="135" class="box risk"/><text x="150" y="1292" class="n">反证退出</text><text x="150" y="1326" class="s">1. 无订单/客户认证/收入占比证据；2. 高估值继续杀跌且无基本面修复；3. 替代路线成熟或扩产过快压低毛利。</text>
<text x="150" y="1360" class="s">结论：每个节点至少三家公司对照，避免把单一强势股误判成整条产业链机会。</text>
</svg>