<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <defs>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Heiti SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 38px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #526071; }
      .layer { font-size: 26px; font-weight: 700; fill: #11415f; }
      .node-title { font-size: 22px; font-weight: 700; }
      .node-sub { font-size: 17px; fill: #526071; }
      .small { font-size: 16px; fill: #526071; }
      .box { fill: #ffffff; stroke: #7fa3b7; stroke-width: 2; rx: 14; }
      .key { fill: #f1fbf8; stroke: #16906d; stroke-width: 3; rx: 14; }
      .bottleneck { fill: #fff7ed; stroke: #dc7a2d; stroke-width: 3; rx: 14; }
      .adj { fill: #f7f4ff; stroke: #8c74c8; stroke-width: 2; stroke-dasharray: 8 6; rx: 14; }
      .arrow { stroke: #16906d; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .side { stroke: #8c74c8; stroke-width: 3; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow-purple); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16906d"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8c74c8"/>
    </marker>
  </defs>

  <rect width="1200" height="1600" fill="#f7f9fb"/>
  <text x="600" y="70" text-anchor="middle" class="title">AI算力服务器产业链图谱</text>
  <text x="600" y="108" text-anchor="middle" class="subtitle">从GPU单机走向机柜级AI系统：芯片/HBM、整柜交付、光互连、液冷供电共同约束</text>

  <text x="80" y="170" class="layer">上游：核心芯片、存储、板级材料与关键部件</text>
  <rect x="80" y="198" width="300" height="130" class="bottleneck"/>
  <text x="230" y="243" text-anchor="middle" class="node-title">GPU/ASIC/国产加速器</text>
  <text x="230" y="280" text-anchor="middle" class="node-sub">NVIDIA/AMD/云ASIC</text>
  <text x="230" y="308" text-anchor="middle" class="node-sub">海光信息、寒武纪等国产映射</text>
  <rect x="450" y="198" width="300" height="130" class="bottleneck"/>
  <text x="600" y="243" text-anchor="middle" class="node-title">HBM与先进封装</text>
  <text x="600" y="280" text-anchor="middle" class="node-sub">HBM3E/HBM4、CoWoS/封装基板</text>
  <text x="600" y="308" text-anchor="middle" class="node-sub">通富微电、长电科技、深南电路</text>
  <rect x="820" y="198" width="300" height="130" class="key"/>
  <text x="970" y="243" text-anchor="middle" class="node-title">PCB/CCL/连接器</text>
  <text x="970" y="280" text-anchor="middle" class="node-sub">高层板、低损耗材料、高速连接</text>
  <text x="970" y="308" text-anchor="middle" class="node-sub">沪电、生益、胜宏、立讯</text>

  <rect x="80" y="368" width="300" height="130" class="key"/>
  <text x="230" y="413" text-anchor="middle" class="node-title">电源与供配电</text>
  <text x="230" y="450" text-anchor="middle" class="node-sub">高功率PSU、母排、机柜供电</text>
  <text x="230" y="478" text-anchor="middle" class="node-sub">欧陆通、麦格米特、科华数据</text>
  <rect x="450" y="368" width="300" height="130" class="key"/>
  <text x="600" y="413" text-anchor="middle" class="node-title">液冷与热管理</text>
  <text x="600" y="450" text-anchor="middle" class="node-sub">冷板、CDU、管路、冷却液</text>
  <text x="600" y="478" text-anchor="middle" class="node-sub">英维克、申菱环境、高澜股份</text>
  <rect x="820" y="368" width="300" height="130" class="key"/>
  <text x="970" y="413" text-anchor="middle" class="node-title">光互连/交换网络</text>
  <text x="970" y="450" text-anchor="middle" class="node-sub">800G/1.6T、CPO/NPO、交换机</text>
  <text x="970" y="478" text-anchor="middle" class="node-sub">中际旭创、新易盛、天孚通信</text>

  <path d="M600 535 L600 610" class="arrow"/>
  <text x="80" y="585" class="layer">中游：AI服务器整机、整柜和集群交付</text>
  <rect x="120" y="620" width="300" height="140" class="key"/>
  <text x="270" y="670" text-anchor="middle" class="node-title">GPU服务器/节点</text>
  <text x="270" y="708" text-anchor="middle" class="node-sub">8卡/多卡节点、国产算力整机</text>
  <text x="270" y="736" text-anchor="middle" class="node-sub">浪潮信息、中科曙光、紫光股份</text>
  <rect x="450" y="620" width="300" height="140" class="bottleneck"/>
  <text x="600" y="670" text-anchor="middle" class="node-title">机柜级AI系统</text>
  <text x="600" y="708" text-anchor="middle" class="node-sub">GB200/GB300 NVL72、整柜液冷</text>
  <text x="600" y="736" text-anchor="middle" class="node-sub">工业富联、ODM/整机厂</text>
  <rect x="780" y="620" width="300" height="140" class="box"/>
  <text x="930" y="670" text-anchor="middle" class="node-title">集群网络与测试</text>
  <text x="930" y="708" text-anchor="middle" class="node-sub">交换机、光模块、Burn-in验证</text>
  <text x="930" y="736" text-anchor="middle" class="node-sub">服务器厂+网络供应链</text>

  <path d="M600 795 L600 870" class="arrow"/>
  <text x="80" y="850" class="layer">下游：云厂商、运营商、政企与模型应用</text>
  <rect x="120" y="880" width="300" height="140" class="box"/>
  <text x="270" y="930" text-anchor="middle" class="node-title">北美CSP/互联网</text>
  <text x="270" y="968" text-anchor="middle" class="node-sub">训练集群、推理集群、云AI服务</text>
  <text x="270" y="996" text-anchor="middle" class="node-sub">Capex决定全球配套链节奏</text>
  <rect x="450" y="880" width="300" height="140" class="box"/>
  <text x="600" y="930" text-anchor="middle" class="node-title">中国云/运营商/政企</text>
  <text x="600" y="968" text-anchor="middle" class="node-sub">国产算力、智算中心、行业模型</text>
  <text x="600" y="996" text-anchor="middle" class="node-sub">采购与政策共同驱动</text>
  <rect x="780" y="880" width="300" height="140" class="adj"/>
  <text x="930" y="930" text-anchor="middle" class="node-title">相邻基础设施</text>
  <text x="930" y="968" text-anchor="middle" class="node-sub">IDC、电力、储能、运维软件</text>
  <text x="930" y="996" text-anchor="middle" class="node-sub">受益但需订单验证</text>

  <path d="M420 690 L450 690" class="arrow"/>
  <path d="M750 690 L780 690" class="arrow"/>
  <path d="M420 950 L450 950" class="arrow"/>
  <path d="M750 950 L780 950" class="side"/>
  <path d="M230 498 C230 565 270 585 270 620" class="arrow"/>
  <path d="M600 498 C600 560 600 585 600 620" class="arrow"/>
  <path d="M970 498 C970 565 930 585 930 620" class="arrow"/>

  <rect x="80" y="1110" width="1040" height="260" class="box"/>
  <text x="115" y="1160" class="layer">瓶颈与利润传导</text>
  <text x="115" y="1204" class="node-sub">1. GPU/HBM/先进封装决定供给节奏；A股直接映射有限，但会约束整机与配套收入确认。</text>
  <text x="115" y="1242" class="node-sub">2. PCB/CCL、光互连、液冷、电源在机柜级系统中规格升级，A股弹性通常高于普通服务器整机。</text>
  <text x="115" y="1280" class="node-sub">3. ODM/整机厂收入确认最直接，但需防止BOM占比高、客户集中和毛利率被压缩。</text>
  <text x="115" y="1318" class="node-sub">4. 国产算力是独立路线：政策与供应安全驱动，但必须验证性能、软件生态、客户与盈利。</text>

  <rect x="80" y="1410" width="1040" height="100" fill="#eef7f4" stroke="#c4ded5" rx="12"/>
  <text x="115" y="1450" class="small">图例：橙色=核心供给卡口；绿色=主链高弹性环节；紫色虚线=相邻基础设施；箭头表示需求向上游传导。</text>
  <text x="115" y="1485" class="small">制图日期：2026-07-10；口径：AI算力服务器/整柜/配套链，不含普通通用服务器概念映射。</text>
</svg>
